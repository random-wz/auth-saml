server:
  host: "0.0.0.0"
  port: 8080
  # 对外暴露的根 URL（必须与在 IdP 中注册的 SP 地址一致）
  base_url: "http://localhost:8080"

saml:
  # SP 证书路径（PEM 格式）；不存在时自动生成自签名证书
  cert_file: "certs/sp.crt"
  key_file: "certs/sp.key"

  # IdP 元数据（二选一）
  # 方式1：通过 URL 自动获取（推荐，支持自动刷新）
  idp_metadata_url: ""
  # 示例:
  # idp_metadata_url: "https://idp.example.com/saml/metadata"
  # idp_metadata_url: "https://accounts.google.com/o/saml2/idp?idpid=YOUR_IDP_ID"
  # idp_metadata_url: "https://login.microsoftonline.com/{tenant}/federationmetadata/2007-06/federationmetadata.xml"
  # idp_metadata_url: "http://localhost:8080/simplesaml/saml2/idp/metadata.php"  # SimpleSAMLphp

  # 方式2：本地文件
  idp_metadata_file: ""
  # 示例: idp_metadata_file: "idp-metadata.xml"

  # SP 实体 ID（留空则默认为 base_url + /saml/metadata）
  entity_id: ""

  # 是否允许 IdP 发起的 SSO（IdP-Initiated SSO）
  allow_idp_initiated: true

  # SAML 属性 → 本地字段 映射表
  # key: SAML 属性名（支持 URN/URL/短名）
  # value: 本地字段名（会出现在 /api/userinfo 的 attributes 中）
  attribute_map:
    # 通用
    "uid": "uid"
    "email": "email"
    "mail": "email"
    "displayName": "displayName"
    "cn": "displayName"
    "givenName": "firstName"
    "sn": "lastName"
    "memberOf": "groups"

    # OID (标准 LDAP/SAML URN)
    "urn:oid:0.9.2342.19200300.100.1.1": "uid"
    "urn:oid:1.2.840.113549.1.9.1": "email"
    "urn:oid:2.5.4.3": "displayName"
    "urn:oid:2.16.840.1.113730.3.1.241": "displayName"
    "urn:oid:1.3.6.1.4.1.5923.1.1.1.7": "entitlements"

    # Microsoft Azure AD / ADFS
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress": "email"
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name": "displayName"
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname": "firstName"
    "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/surname": "lastName"
    "http://schemas.microsoft.com/ws/2008/06/identity/claims/groups": "groups"
    "http://schemas.microsoft.com/identity/claims/objectidentifier": "objectId"

    # Google Workspace
    "http://schemas.xmlsoap.org/claims/EmailAddress": "email"

cookie:
  name: "saml_session"
  max_age: "8h"
  secure: false          # 生产环境建议设置为 true（需要 HTTPS）
  http_only: true

  # 重要：生产环境必须更换为随机的强密钥（至少32字节）
  # 可用: openssl rand -hex 32
  hash_key: "please-change-this-secret-hash-key-32bytes!!"
  block_key: "please-change-this-block-key-32b"
